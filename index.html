<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f8f9fa;color:#1a1a2e;line-height:1.5;min-height:100vh}
a{color:#2563eb;text-decoration:none}
a:hover{text-decoration:underline}

/* Header */
.dd-header{background:#1a1a2e;color:#fff;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.dd-header h1{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.dd-header .dd-ts{font-size:12px;color:#94a3b8;white-space:nowrap}

/* Tab bar */
.dd-tabs{background:#fff;border-bottom:1px solid #e2e8f0;display:flex;gap:0;position:sticky;top:48px;z-index:99}
.dd-tab{padding:12px 24px;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
.dd-tab:hover{color:#1a1a2e;background:#f9fafb}
.dd-tab.active{color:#2563eb;border-bottom-color:#2563eb}

/* Content area */
.dd-content{max-width:1200px;margin:0 auto;padding:20px 24px 60px}
.dd-panel{display:none}
.dd-panel.active{display:block}

/* Summary cards grid */
.dd-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.dd-card{background:#fff;border-radius:10px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.dd-card-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
.dd-card-value{font-size:28px;font-weight:700;line-height:1.2}

/* Accordion */
.dd-accordion{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden}
.dd-acc-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;cursor:pointer;user-select:none;transition:background .12s}
.dd-acc-header:hover{background:#f9fafb}
.dd-acc-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.dd-acc-count{font-size:12px;background:#e2e8f0;color:#475569;border-radius:10px;padding:1px 8px;font-weight:500}
.dd-chevron{width:18px;height:18px;transition:transform .2s;flex-shrink:0}
.dd-acc-header.open .dd-chevron{transform:rotate(180deg)}
.dd-acc-body{display:none;padding:0 18px 14px;border-top:1px solid #f1f5f9}
.dd-acc-body.open{display:block}

/* Badges */
.dd-badge{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px;white-space:nowrap}
.dd-badge-derman{background:#dbeafe;color:#1e40af}
.dd-badge-mirthplus{background:#d1fae5;color:#059669}
.dd-badge-sailpin{background:#fee2e2;color:#dc2626}

/* Due pills */
.dd-pill{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.dd-pill-overdue{background:#fef2f2;color:#dc2626}
.dd-pill-today{background:#fffbeb;color:#d97706}
.dd-pill-soon{background:#ecfdf5;color:#059669}
.dd-pill-later{background:#f1f5f9;color:#64748b}

/* Status pills */
.dd-status{display:inline-block;font-size:11px;font-weight:600;padding:2px 8px;border-radius:6px}
.dd-status-active{background:#d1fae5;color:#059669}
.dd-status-complete,.dd-status-completed{background:#dbeafe;color:#2563eb}
.dd-status-draft{background:#fef3c7;color:#d97706}
.dd-status-scheduled{background:#ede9fe;color:#7c3aed}
.dd-status-paused{background:#fee2e2;color:#dc2626}

/* Tables */
.dd-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:10px}
.dd-table th{text-align:left;font-weight:600;color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:.4px;padding:8px 10px;border-bottom:1px solid #e2e8f0}
.dd-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top}
.dd-table tr:last-child td{border-bottom:none}
.dd-table tr:hover td{background:#f9fafb}

/* Task rows */
.dd-task{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid #f1f5f9}
.dd-task:last-child{border-bottom:none}
.dd-task-name{flex:1;font-size:13px}
.dd-task-due{flex-shrink:0}

/* Event rows */
.dd-event{display:flex;align-items:flex-start;gap:14px;padding:10px 0;border-bottom:1px solid #f1f5f9}
.dd-event:last-child{border-bottom:none}
.dd-event-time{font-size:13px;font-weight:600;color:#2563eb;min-width:120px;flex-shrink:0}
.dd-event-info{flex:1}
.dd-event-title{font-size:14px;font-weight:600}
.dd-event-loc{font-size:12px;color:#64748b;margin-top:2px}

/* GHL conversation row */
.dd-ghl{padding:10px 0;border-bottom:1px solid #f1f5f9}
.dd-ghl:last-child{border-bottom:none}
.dd-ghl-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.dd-ghl-name{font-weight:600;font-size:14px}
.dd-ghl-company{font-size:12px;color:#64748b}
.dd-ghl-msg{font-size:13px;color:#475569}
.dd-ghl-meta{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.dd-ghl-tag{font-size:10px;background:#f1f5f9;color:#475569;padding:1px 6px;border-radius:4px}

/* Email rows */
.dd-email{padding:10px 0;border-bottom:1px solid #f1f5f9}
.dd-email:last-child{border-bottom:none}
.dd-email-subj{font-weight:600;font-size:13px}
.dd-email-sender{font-size:12px;color:#64748b}
.dd-email-snippet{font-size:12px;color:#94a3b8;margin-top:2px}

/* Chart container */
.dd-chart-wrap{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);padding:18px;margin-bottom:14px}
.dd-chart-wrap canvas{width:100%!important;height:260px!important}

/* Pipeline stage bar */
.dd-pipeline-bar{display:flex;height:24px;border-radius:6px;overflow:hidden;margin:10px 0}
.dd-pipeline-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;min-width:2px}
.dd-pipeline-legend{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.dd-pipeline-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:4px;vertical-align:middle}
.dd-pipeline-label{font-size:11px;color:#475569;display:flex;align-items:center}

/* Canva grid */
.dd-canva-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:10px}
.dd-canva-item{background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:14px}
.dd-canva-title{font-size:13px;font-weight:600;margin-bottom:6px;line-height:1.3}
.dd-canva-meta{font-size:11px;color:#64748b;display:flex;gap:10px;flex-wrap:wrap}

/* Shopify badge */
.dd-shop-badge{display:inline-flex;align-items:center;gap:6px;background:#f0fdf4;border:1px solid #bbf7d0;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:500;margin-bottom:14px}
.dd-shop-dot{width:8px;height:8px;background:#22c55e;border-radius:50%}

/* Empty state */
.dd-empty{text-align:center;padding:24px;color:#94a3b8;font-size:13px}

/* Subsection heading */
.dd-sub-heading{font-size:13px;font-weight:600;color:#64748b;margin:14px 0 8px;text-transform:uppercase;letter-spacing:.4px}

/* Unread dot */
.dd-unread{width:8px;height:8px;background:#2563eb;border-radius:50%;display:inline-block;flex-shrink:0;margin-top:4px}

/* Direction arrow */
.dd-dir{font-size:11px;padding:2px 6px;border-radius:4px;font-weight:600}
.dd-dir-in{background:#dbeafe;color:#2563eb}
.dd-dir-out{background:#f1f5f9;color:#64748b}

@media(max-width:640px){
  .dd-summary{grid-template-columns:repeat(2,1fr)}
  .dd-content{padding:12px 12px 40px}
  .dd-tab{padding:10px 14px;font-size:13px}
  .dd-canva-grid{grid-template-columns:1fr}
}
</style>

<script>
(function(){
  const D = window.DASHBOARD_DATA;
  const NOW = new Date(D.timestamp);
  const TODAY = D.timestamp.slice(0,10);

  // --- Utilities ---
  const chevSvg = '<svg class="dd-chevron" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5.23 7.21a.75.75 0 011.06.02L10 11.168l3.71-3.938a.75.75 0 111.08 1.04l-4.25 4.5a.75.75 0 01-1.08 0l-4.25-4.5a.75.75 0 01.02-1.06z" clip-rule="evenodd"/></svg>';

  function esc(s){ if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
  function fmtDate(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); }
  function fmtDateTime(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}); }
  function fmtTime(iso){ if(!iso) return ''; const d=new Date(iso); return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
  function fmtMoney(v,cur){ return new Intl.NumberFormat('en-US',{style:'currency',currency:cur||'USD',minimumFractionDigits:2}).format(Number(v)||0); }
  function fmtNum(v){ return new Intl.NumberFormat('en-US').format(Number(v)||0); }
  function relTime(iso){
    if(!iso) return '';
    const d=new Date(iso);
    const diff=NOW-d;
    const mins=Math.floor(diff/60000);
    if(mins<1) return 'just now';
    if(mins<60) return mins+'m ago';
    const hrs=Math.floor(mins/60);
    if(hrs<24) return hrs+'h ago';
    const days=Math.floor(hrs/24);
    if(days<7) return days+'d ago';
    return fmtDate(iso);
  }
  function relTimeMs(ms){
    if(!ms) return '';
    return relTime(new Date(ms).toISOString());
  }

  function duePill(due){
    if(!due) return '<span class="dd-pill dd-pill-later">No date</span>';
    const d=due;
    const todayStr=TODAY;
    const weekAhead=new Date(NOW);
    weekAhead.setDate(weekAhead.getDate()+7);
    const weekStr=weekAhead.toISOString().slice(0,10);
    if(d<todayStr) return '<span class="dd-pill dd-pill-overdue">Overdue '+fmtDate(d)+'</span>';
    if(d===todayStr) return '<span class="dd-pill dd-pill-today">Today</span>';
    if(d<=weekStr) return '<span class="dd-pill dd-pill-soon">'+fmtDate(d)+'</span>';
    return '<span class="dd-pill dd-pill-later">'+fmtDate(d)+'</span>';
  }

  function brandOf(task){
    const pn=(task.projects&&task.projects[0]&&task.projects[0].name)||'';
    if(/sailpin/i.test(pn)) return 'sailpin';
    if(/mirthplus/i.test(pn)) return 'mirthplus';
    return 'derman';
  }

  function isMarketingTask(task){
    const pn=(task.projects&&task.projects[0]&&task.projects[0].name)||'';
    return /market|content|social|campaign|brand|seo/i.test(pn);
  }

  function accordion(id,title,count,bodyHtml,extraClass){
    return '<div class="dd-accordion">'
      +'<div class="dd-acc-header" onclick="toggleAcc(\''+id+'\')" id="'+id+'_h">'
      +'<span class="dd-acc-title">'+(extraClass?'<span class="dd-badge dd-badge-'+extraClass+'">'+esc(extraClass.charAt(0).toUpperCase()+extraClass.slice(1))+'</span> ':'')+esc(title)+' <span class="dd-acc-count">'+count+'</span></span>'
      +chevSvg
      +'</div>'
      +'<div class="dd-acc-body" id="'+id+'_b">'+bodyHtml+'</div>'
      +'</div>';
  }

  // --- Timestamp ---
  document.getElementById('dd_ts').textContent='Last refreshed: '+NOW.toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit',timeZoneName:'short'});

  // ==================== TRIAGE TAB ====================
  (function buildTriage(){
    const tasks=(D.triage.tasks&&D.triage.tasks.data)||[];
    const incomp=tasks.filter(t=>!t.completed);
    const overdue=incomp.filter(t=>t.due_on&&t.due_on<TODAY).length;
    const weekAhead=new Date(NOW); weekAhead.setDate(weekAhead.getDate()+7);
    const weekStr=weekAhead.toISOString().slice(0,10);
    const dueWeek=incomp.filter(t=>t.due_on&&t.due_on>=TODAY&&t.due_on<=weekStr).length;

    const emails=(D.triage.emails&&D.triage.emails.threads)||[];
    const unreadMail=emails.filter(t=>{
      const m=t.messages&&t.messages[t.messages.length-1];
      return m&&m.labelIds&&m.labelIds.includes('UNREAD');
    }).length;

    const ghlMp=(D.triage.ghlMirthPlus&&D.triage.ghlMirthPlus.conversations)||[];
    const ghlSp=(D.triage.ghlSailpin&&D.triage.ghlSailpin.conversations)||[];
    const ghlUnreplied=[...ghlMp,...ghlSp].filter(c=>c.unreadCount>0).length;

    const events=(D.triage.events&&D.triage.events.events)||[];
    const todayEvents=events.filter(e=>{
      const s=e.start&&(e.start.dateTime||e.start.date);
      return s&&s.slice(0,10)===TODAY;
    });

    let html='';
    // Summary cards
    html+='<div class="dd-summary">';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#dc2626">Overdue</div><div class="dd-card-value" style="color:#dc2626">'+overdue+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#d97706">Due This Week</div><div class="dd-card-value" style="color:#d97706">'+dueWeek+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#2563eb">Unread Mail</div><div class="dd-card-value" style="color:#2563eb">'+unreadMail+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#7c3aed">GHL Unreplied</div><div class="dd-card-value" style="color:#7c3aed">'+ghlUnreplied+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#059669">Events Today</div><div class="dd-card-value" style="color:#059669">'+todayEvents.length+'</div></div>';
    html+='</div>';

    // Today's Calendar
    let calBody='';
    if(todayEvents.length===0) calBody='<div class="dd-empty">No events today</div>';
    else todayEvents.forEach(e=>{
      const st=e.start&&e.start.dateTime?fmtTime(e.start.dateTime):'All day';
      const et=e.end&&e.end.dateTime?' - '+fmtTime(e.end.dateTime):'';
      calBody+='<div class="dd-event">'
        +'<div class="dd-event-time">'+esc(st+et)+'</div>'
        +'<div class="dd-event-info"><div class="dd-event-title">'+esc(e.summary||'(No title)')+'</div>'
        +(e.location?'<div class="dd-event-loc">'+esc(e.location.length>80?e.location.slice(0,80)+'...':e.location)+'</div>':'')
        +(e.attendees?'<div style="font-size:11px;color:#94a3b8;margin-top:2px">'+e.attendees.length+' attendee'+(e.attendees.length!==1?'s':'')+'</div>':'')
        +'</div></div>';
    });
    html+=accordion('t_cal',"Today's Calendar",todayEvents.length,calBody);

    // Group tasks by brand
    const byBrand={derman:[],mirthplus:[],sailpin:[]};
    incomp.forEach(t=>{ byBrand[brandOf(t)].push(t); });

    // Project cards
    [{key:'derman',label:'Derman.biz',ghl:[]},{key:'mirthplus',label:'MirthPlus',ghl:ghlMp},{key:'sailpin',label:'Sailpin',ghl:ghlSp}].forEach(proj=>{
      let body='';
      const bt=byBrand[proj.key];
      if(bt.length>0){
        body+='<div class="dd-sub-heading">Asana Tasks</div>';
        bt.sort((a,b)=>(a.due_on||'9999')>(b.due_on||'9999')?1:-1);
        bt.forEach(t=>{
          body+='<div class="dd-task"><div class="dd-task-name">'+esc(t.name)+'</div><div class="dd-task-due">'+duePill(t.due_on)+'</div></div>';
        });
      }
      if(proj.ghl.length>0){
        body+='<div class="dd-sub-heading" style="margin-top:16px">GHL Conversations</div>';
        proj.ghl.forEach(c=>{
          const dir=c.lastMessageDirection==='inbound'?'in':'out';
          const msgType=(c.lastMessageType||'').replace('TYPE_','');
          body+='<div class="dd-ghl">'
            +'<div class="dd-ghl-top">'
            +(c.unreadCount>0?'<span class="dd-unread"></span>':'')
            +'<span class="dd-ghl-name">'+esc(c.fullName||c.contactName||'Unknown')+'</span>'
            +(c.companyName?'<span class="dd-ghl-company">'+esc(c.companyName)+'</span>':'')
            +'<span class="dd-dir dd-dir-'+dir+'">'+dir.toUpperCase()+'</span>'
            +'<span class="dd-badge" style="background:#f1f5f9;color:#475569">'+esc(msgType)+'</span>'
            +'<span style="font-size:11px;color:#94a3b8;margin-left:auto">'+relTimeMs(c.lastMessageDate)+'</span>'
            +'</div>'
            +'<div class="dd-ghl-msg">'+esc(c.lastMessageBody||'')+'</div>'
            +(c.tags&&c.tags.length?'<div class="dd-ghl-meta">'+c.tags.map(t=>'<span class="dd-ghl-tag">'+esc(t)+'</span>').join('')+'</div>':'')
            +'</div>';
        });
      }
      if(!bt.length&&!proj.ghl.length) body='<div class="dd-empty">No items</div>';
      const total=bt.length+proj.ghl.length;
      html+=accordion('t_'+proj.key,proj.label,total,body,proj.key);
    });

    // Inbox
    let inboxBody='';
    if(emails.length===0) inboxBody='<div class="dd-empty">No emails</div>';
    else emails.forEach(t=>{
      const m=t.messages&&t.messages[t.messages.length-1];
      if(!m) return;
      const isUnread=m.labelIds&&m.labelIds.includes('UNREAD');
      inboxBody+='<div class="dd-email">'
        +'<div style="display:flex;align-items:center;gap:8px">'
        +(isUnread?'<span class="dd-unread"></span>':'')
        +'<span class="dd-email-subj">'+esc(m.subject||'(No subject)')+'</span>'
        +'<span style="font-size:11px;color:#94a3b8;margin-left:auto;white-space:nowrap">'+relTime(m.date)+'</span>'
        +'</div>'
        +'<div class="dd-email-sender">'+esc(m.sender||'')+'</div>'
        +'<div class="dd-email-snippet">'+esc(m.snippet||'')+'</div>'
        +'</div>';
    });
    html+=accordion('t_inbox','Inbox',emails.length,inboxBody);

    document.getElementById('t_panel').innerHTML=html;
  })();

  // ==================== REVENUE TAB ====================
  (function buildRevenue(){
    const analytics=D.revenue.analytics||{};
    const rows=analytics.rows||[];
    const cols=analytics.columns||[];
    const dayIdx=cols.findIndex(c=>c.name==='day');
    const grossIdx=cols.findIndex(c=>c.name==='gross_sales');
    const ordersIdx=cols.findIndex(c=>c.name==='orders');

    const totalRev=parseFloat((analytics.summaryMetric&&analytics.summaryMetric.value)||0);
    const totalOrders=rows.reduce((s,r)=>s+Number(r[ordersIdx]||0),0);

    const mpOpps=(D.revenue.mpOpportunities&&D.revenue.mpOpportunities.opportunities)||[];
    const spOpps=(D.revenue.spOpportunities&&D.revenue.spOpportunities.opportunities)||[];
    const totalOpps=(D.revenue.mpOpportunities&&D.revenue.mpOpportunities.meta&&D.revenue.mpOpportunities.meta.total||0)+(D.revenue.spOpportunities&&D.revenue.spOpportunities.meta&&D.revenue.spOpportunities.meta.total||0);
    const totalPipeVal=[...mpOpps,...spOpps].reduce((s,o)=>s+(Number(o.monetaryValue)||0),0);

    const mpInvData=D.revenue.mpInvoices;
    const spInvData=D.revenue.spInvoices;
    const mpInvList=(mpInvData&&mpInvData.data&&mpInvData.data.invoices)||(mpInvData&&mpInvData.invoices)||[];
    const spInvList=(spInvData&&spInvData.data&&spInvData.data.invoices)||(spInvData&&spInvData.invoices)||[];
    const openInvoices=mpInvList.length+spInvList.length;

    const shop=D.revenue.shopInfo||{};

    let html='';
    // Summary cards
    html+='<div class="dd-summary">';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#059669">30d Revenue</div><div class="dd-card-value" style="color:#059669">'+fmtMoney(totalRev,shop.currencyCode)+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#2563eb">30d Orders</div><div class="dd-card-value" style="color:#2563eb">'+totalOrders+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#7c3aed">Pipeline Opps</div><div class="dd-card-value" style="color:#7c3aed">'+fmtNum(totalOpps)+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#d97706">Pipeline Value</div><div class="dd-card-value" style="color:#d97706">'+fmtMoney(totalPipeVal)+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#dc2626">Open Invoices</div><div class="dd-card-value" style="color:#dc2626">'+openInvoices+'</div></div>';
    html+='</div>';

    // Shopify badge
    html+='<div class="dd-shop-badge"><span class="dd-shop-dot"></span>Connected: <strong>'+esc(shop.name||'Store')+'</strong> ('+esc(shop.domain||'')+') <span style="color:#94a3b8;font-size:11px;margin-left:8px">Single-store Shopify connection</span></div>';

    // Chart
    html+='<div class="dd-chart-wrap"><div style="font-size:14px;font-weight:600;margin-bottom:10px">30-Day Gross Sales</div><canvas id="r_chart"></canvas></div>';

    // Recent orders
    const orders=(D.revenue.orders&&D.revenue.orders.orders)||[];
    let ordBody='';
    if(orders.length===0) ordBody='<div class="dd-empty">No orders</div>';
    else{
      ordBody+='<table class="dd-table"><thead><tr><th>Order</th><th>Date</th><th>Customer</th><th>Total</th><th>Status</th><th>Fulfillment</th></tr></thead><tbody>';
      orders.forEach(o=>{
        const fs=(o.financialStatus||'').toLowerCase().replace(/_/g,' ');
        const ff=(o.fulfillmentStatus||'unfulfilled').toLowerCase().replace(/_/g,' ');
        ordBody+='<tr><td><strong>'+esc(o.name)+'</strong></td><td>'+fmtDate(o.createdAt)+'</td><td>'+esc(o.customerName||'')+'</td><td>'+fmtMoney(o.totalPrice,o.currencyCode)+'</td><td style="text-transform:capitalize">'+esc(fs)+'</td><td style="text-transform:capitalize">'+esc(ff)+'</td></tr>';
      });
      ordBody+='</tbody></table>';
    }
    html+=accordion('r_orders','Recent Orders',orders.length,ordBody);

    // Pipeline helpers
    const stageColors=['#3b82f6','#8b5cf6','#ec4899','#f97316','#eab308','#22c55e','#14b8a6','#64748b','#0ea5e9','#f43f5e'];
    function pipelineHtml(prefix,pipelines,opps){
      let out='';
      pipelines.forEach(pl=>{
        const stages=pl.stages.sort((a,b)=>a.position-b.position);
        // Count opps per stage
        const stageCounts={};
        stages.forEach(s=>stageCounts[s.id]=0);
        const plOpps=opps.filter(o=>o.pipelineId===pl.id);
        plOpps.forEach(o=>{if(stageCounts[o.pipelineStageId]!==undefined) stageCounts[o.pipelineStageId]++;});
        const totalInPl=plOpps.length;

        out+='<div style="margin-bottom:16px"><div style="font-size:14px;font-weight:600;margin-bottom:6px">'+esc(pl.name)+' <span style="font-size:12px;color:#94a3b8;font-weight:400">('+totalInPl+' opps)</span></div>';

        if(totalInPl>0){
          out+='<div class="dd-pipeline-bar">';
          stages.forEach((s,i)=>{
            const cnt=stageCounts[s.id];
            if(cnt===0) return;
            const pct=Math.max((cnt/totalInPl*100),4);
            out+='<div class="dd-pipeline-seg" style="width:'+pct+'%;background:'+stageColors[i%stageColors.length]+'" title="'+esc(s.name)+': '+cnt+'">'+cnt+'</div>';
          });
          out+='</div>';
          out+='<div class="dd-pipeline-legend">';
          stages.forEach((s,i)=>{
            out+='<span class="dd-pipeline-label"><span class="dd-pipeline-dot" style="background:'+stageColors[i%stageColors.length]+'"></span>'+esc(s.name)+' ('+stageCounts[s.id]+')</span>';
          });
          out+='</div>';
        } else {
          out+='<div class="dd-empty">No opportunities in this pipeline</div>';
        }

        // Recent opps
        const recent=plOpps.slice(0,5);
        if(recent.length>0){
          out+='<table class="dd-table" style="margin-top:8px"><thead><tr><th>Contact</th><th>Company</th><th>Value</th><th>Stage</th><th>Created</th></tr></thead><tbody>';
          recent.forEach(o=>{
            const stageName=(stages.find(s=>s.id===o.pipelineStageId)||{}).name||'';
            const name=o.name||(o.contact&&o.contact.name)||'';
            const company=(o.contact&&o.contact.companyName)||'';
            out+='<tr><td>'+esc(name)+'</td><td>'+esc(company)+'</td><td>'+fmtMoney(o.monetaryValue)+'</td><td>'+esc(stageName)+'</td><td>'+fmtDate(o.createdAt)+'</td></tr>';
          });
          out+='</tbody></table>';
        }
        out+='</div>';
      });
      return out;
    }

    // MirthPlus pipelines
    const mpPipes=(D.revenue.mpPipelines&&D.revenue.mpPipelines.pipelines)||[];
    const mpPipeBody=pipelineHtml('r_mp',mpPipes,mpOpps);
    html+=accordion('r_mp_pipe','MirthPlus Pipelines',mpPipes.length+' pipelines, '+(D.revenue.mpOpportunities&&D.revenue.mpOpportunities.meta&&D.revenue.mpOpportunities.meta.total||0)+' opps',mpPipeBody,'mirthplus');

    // SailPin pipelines
    const spPipes=(D.revenue.spPipelines&&D.revenue.spPipelines.pipelines)||[];
    const spPipeBody=pipelineHtml('r_sp',spPipes,spOpps);
    html+=accordion('r_sp_pipe','SailPin Pipelines',spPipes.length+' pipeline'+(spPipes.length!==1?'s':'')+', '+(D.revenue.spOpportunities&&D.revenue.spOpportunities.meta&&D.revenue.spOpportunities.meta.total||0)+' opps',spPipeBody,'sailpin');

    // Invoices
    let invBody='';
    if(mpInvList.length===0&&spInvList.length===0) invBody='<div class="dd-empty">No open invoices</div>';
    else{
      [['MirthPlus',mpInvList],['SailPin',spInvList]].forEach(([label,list])=>{
        if(list.length===0) return;
        invBody+='<div class="dd-sub-heading">'+label+'</div>';
        invBody+='<table class="dd-table"><thead><tr><th>Invoice</th><th>Amount</th><th>Status</th><th>Due</th></tr></thead><tbody>';
        list.forEach(inv=>{
          invBody+='<tr><td>'+esc(inv.name||inv.invoiceNumber||inv.id)+'</td><td>'+fmtMoney(inv.total||inv.amount||0)+'</td><td>'+esc(inv.status||'')+'</td><td>'+fmtDate(inv.dueDate||'')+'</td></tr>';
        });
        invBody+='</tbody></table>';
      });
    }
    html+=accordion('r_invoices','Invoices',openInvoices,invBody);

    document.getElementById('r_panel').innerHTML=html;

    // Chart (lazy init)
    window._revenueChartInited=false;
    window._initRevenueChart=function(){
      if(window._revenueChartInited) return;
      window._revenueChartInited=true;
      const ctx=document.getElementById('r_chart');
      if(!ctx) return;
      const labels=rows.map(r=>{
        const d=new Date(r[dayIdx]);
        return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
      });
      const data=rows.map(r=>parseFloat(r[grossIdx])||0);
      new Chart(ctx,{
        type:'bar',
        data:{
          labels:labels,
          datasets:[{
            label:'Gross Sales (USD)',
            data:data,
            backgroundColor:'rgba(37,99,235,0.7)',
            borderRadius:4,
            borderSkipped:false
          }]
        },
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{callbacks:{label:function(c){return fmtMoney(c.parsed.y);}}}},
          scales:{
            x:{grid:{display:false},ticks:{font:{size:10},maxRotation:45,minRotation:45}},
            y:{beginAtZero:true,ticks:{callback:function(v){return '$'+v;}}}
          }
        }
      });
    };
  })();

  // ==================== CONTENT TAB ====================
  (function buildContent(){
    const mpCamp=(D.content.mpCampaigns&&D.content.mpCampaigns.campaigns)||[];
    const spCamp=(D.content.spCampaigns&&D.content.spCampaigns.campaigns)||[];
    const allCamp=[...mpCamp,...spCamp];
    const activeCamp=allCamp.filter(c=>c.status==='active').length;
    const draftCamp=allCamp.filter(c=>c.status==='draft').length;
    const totalSends=allCamp.reduce((s,c)=>s+(Number(c.totalCount)||0),0);
    const canvaItems=(D.content.canvaDesigns&&D.content.canvaDesigns.items)||[];

    // Marketing tasks from triage
    const tasks=(D.triage.tasks&&D.triage.tasks.data)||[];
    const mktTasks=tasks.filter(t=>!t.completed&&isMarketingTask(t));

    let html='';
    // Summary cards
    html+='<div class="dd-summary">';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#059669">Active Campaigns</div><div class="dd-card-value" style="color:#059669">'+activeCamp+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#d97706">Drafts</div><div class="dd-card-value" style="color:#d97706">'+draftCamp+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#2563eb">Total Sends</div><div class="dd-card-value" style="color:#2563eb">'+fmtNum(totalSends)+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#7c3aed">Canva Designs</div><div class="dd-card-value" style="color:#7c3aed">'+canvaItems.length+'</div></div>';
    html+='<div class="dd-card"><div class="dd-card-label" style="color:#dc2626">Marketing Tasks</div><div class="dd-card-value" style="color:#dc2626">'+mktTasks.length+'</div></div>';
    html+='</div>';

    // Campaign section helper
    function campRows(list){
      if(list.length===0) return '<div class="dd-empty">No campaigns</div>';
      let out='<table class="dd-table"><thead><tr><th>Campaign</th><th>Subject</th><th>Status</th><th>Type</th><th>Sent</th><th>Success</th><th>Failed</th></tr></thead><tbody>';
      list.forEach(c=>{
        const st=c.status||'unknown';
        const cls='dd-status dd-status-'+(st==='complete'?'completed':st);
        out+='<tr><td><strong>'+esc(c.name)+'</strong></td><td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(c.subject||'')+'</td><td><span class="'+cls+'">'+esc(st)+'</span></td><td style="font-size:12px;color:#64748b">'+esc((c.campaignType||'').replace(/_/g,' '))+'</td><td>'+fmtNum(c.totalCount||0)+'</td><td>'+fmtNum(c.success||0)+'</td><td>'+fmtNum(c.failed||0)+'</td></tr>';
      });
      out+='</tbody></table>';
      return out;
    }

    // MirthPlus campaigns
    const mpTotal=(D.content.mpCampaigns&&D.content.mpCampaigns.total&&D.content.mpCampaigns.total[0]&&D.content.mpCampaigns.total[0].total)||mpCamp.length;
    html+=accordion('c_mp_camp','MirthPlus Email Campaigns',mpTotal+' total',campRows(mpCamp),'mirthplus');

    // SailPin campaigns
    const spTotal=(D.content.spCampaigns&&D.content.spCampaigns.total&&D.content.spCampaigns.total[0]&&D.content.spCampaigns.total[0].total)||spCamp.length;
    html+=accordion('c_sp_camp','SailPin Email Campaigns',spTotal+' total',campRows(spCamp),'sailpin');

    // Canva designs
    let canvaBody='';
    if(canvaItems.length===0) canvaBody='<div class="dd-empty">No designs found</div>';
    else{
      canvaBody+='<div class="dd-canva-grid">';
      canvaItems.forEach(d=>{
        // updated_at is Unix seconds
        const updDate=new Date(d.updated_at*1000);
        const updStr=updDate.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
        const typeBadge=d.type?'<span class="dd-badge" style="background:#ede9fe;color:#7c3aed">'+esc(d.type)+'</span>':'';
        canvaBody+='<div class="dd-canva-item">'
          +'<div class="dd-canva-title">'+esc(d.title||'Untitled')+'</div>'
          +'<div class="dd-canva-meta"><span>'+d.page_count+' page'+(d.page_count!==1?'s':'')+'</span><span>'+updStr+'</span>'+typeBadge+'</div>'
          +'</div>';
      });
      canvaBody+='</div>';
    }
    html+=accordion('c_canva','Canva Designs',canvaItems.length,canvaBody);

    // Social posts
    const mpSocial=(D.content.mpSocial&&D.content.mpSocial.posts)||[];
    const spSocial=(D.content.spSocial&&D.content.spSocial.posts)||[];
    let socialBody='';
    if(mpSocial.length===0&&spSocial.length===0) socialBody='<div class="dd-empty">No social posts</div>';
    else{
      [['MirthPlus',mpSocial],['SailPin',spSocial]].forEach(([label,posts])=>{
        if(posts.length===0) return;
        socialBody+='<div class="dd-sub-heading">'+label+'</div>';
        posts.forEach(p=>{
          socialBody+='<div style="padding:8px 0;border-bottom:1px solid #f1f5f9"><strong>'+esc(p.title||p.summary||'Post')+'</strong><div style="font-size:12px;color:#64748b">'+esc(p.status||'')+'</div></div>';
        });
      });
    }
    html+=accordion('c_social','Social Posts',(mpSocial.length+spSocial.length),socialBody);

    // Marketing tasks by brand
    const mktByBrand={derman:[],mirthplus:[],sailpin:[]};
    mktTasks.forEach(t=>mktByBrand[brandOf(t)].push(t));
    let mktBody='';
    [['MirthPlus','mirthplus'],['SailPin','sailpin'],['Derman','derman']].forEach(([label,key])=>{
      const list=mktByBrand[key];
      if(list.length===0) return;
      mktBody+='<div class="dd-sub-heading"><span class="dd-badge dd-badge-'+key+'">'+label+'</span></div>';
      list.sort((a,b)=>(a.due_on||'9999')>(b.due_on||'9999')?1:-1);
      list.forEach(t=>{
        mktBody+='<div class="dd-task"><div class="dd-task-name">'+esc(t.name)+'</div><div class="dd-task-due">'+duePill(t.due_on)+'</div></div>';
      });
    });
    if(!mktBody) mktBody='<div class="dd-empty">No marketing tasks</div>';
    html+=accordion('c_mkt_tasks','Marketing Tasks',mktTasks.length,mktBody);

    document.getElementById('c_panel').innerHTML=html;
  })();

  // ==================== TAB SWITCHING ====================
  window.switchTab=function(tab){
    document.querySelectorAll('.dd-tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
    document.querySelectorAll('.dd-panel').forEach(p=>p.classList.remove('active'));
    const panelId={triage:'t_panel',revenue:'r_panel',content:'c_panel'}[tab];
    if(panelId) document.getElementById(panelId).classList.add('active');
    if(tab==='revenue'&&window._initRevenueChart) window._initRevenueChart();
    history.replaceState(null,null,'#'+tab);
  };

  // Init from hash
  const hash=location.hash.replace('#','');
  if(['triage','revenue','content'].includes(hash)) switchTab(hash);

  // ==================== ACCORDION TOGGLE ====================
  window.toggleAcc=function(id){
    const h=document.getElementById(id+'_h');
    const b=document.getElementById(id+'_b');
    if(!h||!b) return;
    const isOpen=h.classList.contains('open');
    h.classList.toggle('open',!isOpen);
    b.classList.toggle('open',!isOpen);
  };

})();
</script>
</body>
</html>
